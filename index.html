        setDayStatus(loadDayStatus(allWeeks[activeWeek].week));

        setCompletedWeeks(prev => {
          const updated = prev.includes(weekIdx)
            ? prev.filter(w => w !== weekIdx)
            : [...prev, weekIdx];
          localStorage.setItem("completedWeeks", JSON.stringify(updated));
          return updated;
        });
      };

        setDayStatus(prev => {
          const updated = [...prev];
          updated[index] =
            updated[index] === "" ? "✔️" :
            updated[index] === "✔️" ? "❌" : "";
          saveDayStatus(allWeeks[activeWeek].week, updated);
          return updated;
        });
      };

                height: "100%",

              }} />

            gridTemplateColumns: "repeat(6,1fr)",
            gap: 5,
            marginBottom: 20
          }}>

              const active = i === activeWeek;
              const done = completedWeeks.includes(i);
              const color = phaseColors[w.phase];
              return (
                <button
                  key={i}
                  onClick={() => setActiveWeek(i)}
                  style={{
                    padding: "6px 2px",
                    borderRadius: 7,
                    border: `1.5px solid ${active ? color : done ? color + "50" : "#334155"}`,
                    background: active ? color + "18" : done ? color + "08" : "#0f172a",
                    color: active ? color : done ? color + "90" : "#94a3b8",
                    fontSize: 11,
                    fontWeight: active ? 700 : 400,
                    cursor: "pointer"
                  }}
                >
                  {done ? "✓" : `W${w.week}`}
                </button>
              );
            })}
          </div>

            padding: 14,
            borderRadius: 12,
            background: phaseColors[week.phase] + "10",
            border: `1px solid ${phaseColors[week.phase]}28`,
            marginBottom: 14
          }}>

                <div style={{
                  fontSize: 10,
                  color: phaseColors[week.phase],
                  letterSpacing: 2,
                  textTransform: "uppercase"

                >
                  <div
                    style={{
                      minWidth: 28,
                      fontWeight: 700,
                      fontSize: 12,
                      color:
                        d.type === "lauf"
                          ? phaseColors[week.phase]
                          : d.type === "gehen"
                          ? "#94a3b8"
                          : "#64748b"
                    }}
                  >
                    {d.day}
                  </div>

                  <div
                    style={{
                      width: 6,
                      height: 6,
                      borderRadius: "50%",
                      background: cfg.dot,
                      marginTop: 4
                    }}
                  />

                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{d.strecke}</div>
                    <div style={{ fontSize: 11, color: "#64748b" }}>{d.note}</div>
                  </div>

                  <button
                    onClick={() => toggleDay(i)}
                    style={{
                      fontSize: 16,
                      width: 32,
                      height: 32,
                      borderRadius: 8,
                      border: "1px solid #334155",
                      background: "#0f172a",
                      color:
                        status === "✔️"
                          ? "#4ade80"
                          : status === "❌"
                          ? "#f87171"
                          : "#64748b",
                      cursor: "pointer"
                    }}
                  >
                    {status || "·"}
                  </button>
                </div>
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            <button
              onClick={() => setActiveWeek(Math.max(0, activeWeek - 1))}
              disabled={activeWeek === 0}
              style={{
                flex: 1,
                padding: 10,
                borderRadius: 9,
                border: "1px solid #334155",
                background: "#0f172a",
                color: activeWeek === 0 ? "#1e293b" : "#94a3b8",
                cursor: activeWeek === 0 ? "default" : "pointer"
              }}
            >
              ← Vorherige
            </button>

            <button
              onClick={() =>
                setActiveWeek(Math.min(allWeeks.length - 1, activeWeek + 1))
              }
              disabled={activeWeek === allWeeks.length - 1}
              style={{
                flex: 1,
                padding: 10,
                borderRadius: 9,
                border: `1px solid ${phaseColors[week.phase]}40`,
                background: phaseColors[week.phase] + "12",
                color: phaseColors[week.phase],
                fontWeight: 600,
                cursor:
                  activeWeek === allWeeks.length - 1 ? "default" : "pointer"
              }}
            >
              Nächste →
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Trainingsplan />);
  </script>
</body>
</html>
